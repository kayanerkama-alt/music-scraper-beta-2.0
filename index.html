<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Streaming Addon Core</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b0b0b;
  color:white;
}

header{
  padding:10px;
  background:#111;
  display:flex;
  gap:10px;
}

input{
  flex:1;
  padding:10px;
  border-radius:8px;
  border:none;
  background:#222;
  color:white;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:#1db954;
  cursor:pointer;
}

.layout{
  display:grid;
  grid-template-columns:300px 1fr;
  height:calc(100vh - 60px);
}

.sidebar{
  border-right:1px solid #222;
  padding:10px;
  overflow:auto;
}

.main{
  padding:10px;
  overflow:auto;
}

.track{
  padding:10px;
  border-bottom:1px solid #222;
  cursor:pointer;
}

.track:hover{
  background:#1a1a1a;
}

.player{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#111;
  border-top:1px solid #222;
  padding:10px;
  display:flex;
  gap:10px;
  align-items:center;
}

small{color:#aaa}
</style>
</head>

<body>

<header>
<input id="search" placeholder="Search tracks...">
<button onclick="runSearch()">Search</button>
<button onclick="loadDemo()">Load</button>
</header>

<div class="layout">

<div class="sidebar">
<b>Queue</b>
<div id="queue"></div>
</div>

<div class="main">
<div id="list"></div>
</div>

</div>

<div class="player">

<button onclick="prev()">⏮</button>
<button onclick="toggle()">▶/⏸</button>
<button onclick="next()">⏭</button>

<div style="min-width:200px">
<div id="now">Nothing playing</div>
<small id="sub"></small>
</div>

<audio id="audio" controls></audio>

</div>

<script>

/* CORE STATE */
let library = [];
let queue = [];
let index = -1;

const audio = document.getElementById("audio");

/* ADD TRACK */
function addTrack(t){
  if(!t.url) return;
  library.push(t);
}

/* RENDER LIST */
function render(){
  document.getElementById("list").innerHTML =
  library.map((t,i)=>`
    <div class="track" onclick="addToQueue(${i})">
      <b>${t.title}</b><br>
      <small>${t.artist||""}</small>
    </div>
  `).join("");
}

/* QUEUE */
function addToQueue(i){
  queue.push(library[i]);
  renderQueue();
}

function renderQueue(){
  document.getElementById("queue").innerHTML =
  queue.map((t,i)=>`
    <div class="track" onclick="playQueue(${i})">
      ${t.title}
    </div>
  `).join("");
}

/* PLAY ENGINE (FIXED) */
function playQueue(i){

  const t = queue[i];
  if(!t) return;

  index = i;

  audio.src = t.url;
  audio.play();

  document.getElementById("now").innerText = t.title;
  document.getElementById("sub").innerText = t.artist || "";
}

/* PLAYER CONTROLS */
function next(){
  if(index < queue.length-1){
    playQueue(index+1);
  }
}

function prev(){
  if(index > 0){
    playQueue(index-1);
  }
}

function toggle(){
  audio.paused ? audio.play() : audio.pause();
}

audio.onended = next;

/* SEARCH (REAL FIXED LOGIC) */
function runSearch(){

  const q = document.getElementById("search").value.toLowerCase();

  const filtered = library.filter(t=>
    (t.title + " " + t.artist)
    .toLowerCase()
    .includes(q)
  );

  document.getElementById("list").innerHTML =
  filtered.map((t,i)=>`
    <div class="track" onclick="addToQueue(${i})">
      <b>${t.title}</b><br>
      <small>${t.artist||""}</small>
    </div>
  `).join("");
}

/* DEMO DATA */
function loadDemo(){

  library = [
    {title:"Track One",artist:"Label A",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"},
    {title:"Track Two",artist:"Label B",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"},
    {title:"Track Three",artist:"Label C",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"}
  ];

  render();
}

/* INIT */
loadDemo();

</script>

</body>
</html>
